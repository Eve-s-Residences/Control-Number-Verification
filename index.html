<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Eves Residences | Verification Portal</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root {
            --primary: #007bff;
            --dark: #343a40;
            --success: #28a745;
            --error: #dc3545;
            --bg: #f8f9fa;
            --footer-text: #6c757d;
        }

        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background: var(--bg); 
            margin: 0; 
            display: flex; 
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .main-content {
            flex: 1 0 auto;
            width: 100%;
            max-width: 450px;
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .card { 
            background: white; 
            padding: 25px; 
            border-radius: 16px; 
            box-shadow: 0 8px 30px rgba(0,0,0,0.08); 
            text-align: center; 
        }

        h2 { color: var(--dark); margin-bottom: 20px; font-size: 1.5rem; }

        input { 
            width: 100%; 
            padding: 15px; 
            margin: 10px 0; 
            border: 2px solid #eee; 
            border-radius: 10px; 
            box-sizing: border-box; 
            font-size: 18px;
            text-align: center;
            text-transform: uppercase;
            outline: none;
            background-color: #fff;
        }

        .btn-group { display: flex; flex-direction: column; gap: 12px; margin-top: 10px; }

        button { 
            width: 100%; 
            padding: 16px; 
            border: none; 
            border-radius: 10px; 
            cursor: pointer; 
            font-size: 16px;
            font-weight: 600; 
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: opacity 0.2s;
        }

        button:active { opacity: 0.8; }

        .btn-verify { background: var(--primary); color: white; }
        .btn-scan { background: var(--dark); color: white; }

        #reader { 
            width: 100%; 
            margin-top: 15px; 
            display: none; 
            border-radius: 12px; 
            overflow: hidden;
            border: 2px solid var(--dark);
        }

        #result { 
            margin-top: 20px; 
            padding: 20px; 
            border-radius: 12px; 
            display: none; 
            line-height: 1.6;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .valid { background: #e7f4e4; color: #1e4620; border: 1px solid #c3e6cb; }
        .invalid { background: #fdf2f2; color: #721c24; border: 1px solid #f5c2c7; }
        .searching { background: #e3f2fd; color: #0d47a1; border: 1px solid #bbdefb; }

        /* Virtual Keyboard */
        #keyboard {
            position: fixed;
            bottom: -100%;
            left: 0;
            width: 100%;
            background: #d1d4d9;
            padding: 10px 0 30px 0;
            transition: bottom 0.3s ease;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.1);
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 6px;
            padding-left: 6px;
            padding-right: 6px;
            box-sizing: border-box;
            z-index: 1000;
        }

        #keyboard.open { bottom: 0; }

        .key {
            background: white;
            padding: 15px 0;
            border-radius: 6px;
            text-align: center;
            font-weight: bold;
            font-size: 18px;
            box-shadow: 0 1px 0 rgba(0,0,0,0.2);
            cursor: pointer;
            user-select: none;
        }

        .key:active { background: #adb5bd; }
        .key.special { background: #adb5bd; }
        .key.done { background: var(--primary); color: white; grid-column: span 2; }

        footer {
            flex-shrink: 0;
            width: 100%;
            padding: 20px 0;
            text-align: center;
            font-size: 12px;
            color: var(--footer-text);
            line-height: 1.5;
        }
    </style>
</head>
<body>

<div class="main-content">
    <div class="card">
        <img src="https://img.icons8.com/fluency/96/verified-badge.png" alt="Logo" width="50">
        <h2>Tenant Verification</h2>
        
        <input type="text" id="hashInput" placeholder="CLICK TO ENTER CODE" readonly>
        
        <div class="btn-group">
            <button class="btn-verify" onclick="callApi()">Verify Code</button>
            <button class="btn-scan" onclick="toggleScanner()">📷 Scan Barcode</button>
        </div>
        
        <div id="reader"></div>
        <div id="result"></div>
    </div>
</div>

<footer>
    Powered by <strong>Eve's Residences IT Department</strong><br>
    All Rights Reserved &copy; 2026
</footer>

<div id="keyboard">
    <div class="key" onclick="press('1')">1</div>
    <div class="key" onclick="press('2')">2</div>
    <div class="key" onclick="press('3')">3</div>
    <div class="key" onclick="press('4')">4</div>
    <div class="key" onclick="press('5')">5</div>
    <div class="key" onclick="press('6')">6</div>
    <div class="key" onclick="press('7')">7</div>
    <div class="key" onclick="press('8')">8</div>
    <div class="key" onclick="press('9')">9</div>
    <div class="key" onclick="press('0')">0</div>
    <div class="key" onclick="press('A')">A</div>
    <div class="key" onclick="press('B')">B</div>
    <div class="key" onclick="press('C')">C</div>
    <div class="key" onclick="press('D')">D</div>
    <div class="key" onclick="press('E')">E</div>
    <div class="key" onclick="press('F')">F</div>
    <div class="key special" onclick="press('back')">⌫</div>
    <div class="key done" onclick="closeKeyboard()">DONE</div>
</div>

<script>
    // BOTH API ENDPOINTS
    const API_RESERVATION = "https://script.google.com/macros/s/AKfycbzbFbeBjIh7U5VVHvyvezoztpX8Voo6w3-5k0HdmZ5xF0xbfB-YwYClgUGKhvMslrWe5w/exec";
    const API_RENEWAL = "https://script.google.com/macros/s/AKfycbynrj-Bv-Z2azSrzP8WT-H0XJJruz5vlLnDl3gFk_xeTq_TIODLpeNRZA0CTbCnE3u2/exec";
    
    const scanner = new Html5Qrcode("reader");
    const input = document.getElementById('hashInput');
    const kb = document.getElementById('keyboard');

    input.addEventListener('click', (e) => {
        kb.classList.add('open');
        e.stopPropagation();
    });

    document.addEventListener('click', (e) => {
        if(!kb.contains(e.target) && e.target !== input) closeKeyboard();
    });

    function press(key) {
        if (key === 'back') {
            input.value = input.value.slice(0, -1);
        } else {
            if(input.value.length < 16) input.value += key;
        }
    }

    function closeKeyboard() { kb.classList.remove('open'); }

    async function callApi(code) {
        const hash = code || input.value;
        if(!hash) return;
        
        closeKeyboard();
        const resultDiv = document.getElementById('result');
        resultDiv.style.display = "block";
        resultDiv.className = "searching";
        resultDiv.innerHTML = "Checking databases...";

        try {
            // STEP 1: Check Reservation Database
            let response = await fetch(`${API_RESERVATION}?hash=${hash}`);
            let data = await response.json();

            // STEP 2: If not found, Check Renewal Database
            if (!data.valid) {
                resultDiv.innerHTML = "Checking Renewal records...";
                response = await fetch(`${API_RENEWAL}?hash=${hash}`);
                data = await response.json();
            }

            // FINAL RESULT
            if (data.valid) {
                resultDiv.className = "valid";
                resultDiv.innerHTML = `
                    <strong>✅ VERIFIED</strong><br>
                    Tenant: ${data.name}<br>
                    Unit: ${data.unit}<br>
                    Property: ${data.property}`;
            } else {
                resultDiv.className = "invalid";
                resultDiv.innerHTML = "<strong>❌ NOT FOUND</strong><br>Code invalid or expired in both databases.";
            }
        } catch (err) {
            resultDiv.className = "invalid";
            resultDiv.innerHTML = "⚠️ Server connection error.";
            console.error(err);
        }
    }

    function toggleScanner() {
        const reader = document.getElementById('reader');
        if (reader.style.display === "block") {
            scanner.stop();
            reader.style.display = "none";
        } else {
            closeKeyboard();
            reader.style.display = "block";
            scanner.start(
                { facingMode: "environment" }, 
                { fps: 15, qrbox: {width: 280, height: 130} }, 
                (text) => {
                    callApi(text);
                    scanner.stop();
                    reader.style.display = "none";
                }
            ).catch(err => console.error(err));
        }
    }
</script>

</body>
</html>
